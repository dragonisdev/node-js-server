<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-dashboard">

        <!-- Header -->
        <div class="dashboard-header">
            <div>
                <h1 id="pageTitle">Add Course</h1>
                <p>Welcome back, <span id="adminUsername">...</span></p>
            </div>
            <div class="header-actions">
                <a href="/admin-dashboard" class="btn-secondary">
                    <span class="material-icons">arrow_back</span>
                    Back to Dashboard
                </a>
                <button type="button" id="logoutBtn" class="btn-primary">
                    <span class="material-icons">logout</span>
                    Logout
                </button>
            </div>
        </div>

        <!-- Form Section -->
        <div class="dashboard-section form-section">
            <form id="courseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courseCode">Course Code *</label>
                        <input type="text" id="courseCode" name="courseCode" required maxlength="20" placeholder="e.g. CS101">
                    </div>
                    <div class="form-group">
                        <label for="title">Course Title *</label>
                        <input type="text" id="title" name="title" required maxlength="255" placeholder="e.g. Introduction to Computer Science">
                    </div>
                    <div class="form-group">
                        <label for="credits">Credits</label>
                        <input type="number" id="credits" name="credits" value="5" min="1" max="10">
                    </div>
                    <div class="form-group">
                        <label for="maxStudents">Max Students</label>
                        <input type="number" id="maxStudents" name="maxStudents" value="30" min="1">
                    </div>
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate" name="startDate">
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date</label>
                        <input type="date" id="endDate" name="endDate">
                    </div>
                    <div class="form-group form-group-checkbox" id="activeGroup" style="display: none;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="isActive" name="isActive" checked>
                            Active
                        </label>
                    </div>
                </div>

                <div id="formMessage"></div>

                <div class="form-actions">
                    <a href="/admin-dashboard" class="btn-secondary">Cancel</a>
                    <button type="submit" id="submitBtn" class="btn-primary">Save Course</button>
                </div>
            </form>
        </div>

    </div>

    <script src="course-management.js"></script>
</body>
</html>
