<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-dashboard">

        <!-- Header -->
        <div class="dashboard-header">
            <div>
                <h1>Student Dashboard</h1>
                <p>Welcome back, <span id="studentUsername">...</span></p>
            </div>
            <div>
                <button type="button" id="logoutBtn" class="btn-primary">
                    <span class="material-icons">logout</span>
                    Logout
                </button>
            </div>
        </div>

        <!-- My Courses Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>My Courses</h2>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Title</th>
                        <th>Credits</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="myCoursesTableBody">
                    <tr>
                        <td colspan="7" class="table-loading">Loading your courses...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Available Courses Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>Available Courses</h2>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Title</th>
                        <th>Credits</th>
                        <th>Spots Taken</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="availableCoursesTableBody">
                    <tr>
                        <td colspan="7" class="table-loading">Loading available courses...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="authentication.js"></script>
    <script src="student-dashboard.js"></script>
</body>
</html>
