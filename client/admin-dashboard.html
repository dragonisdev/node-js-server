<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-dashboard">

        <!-- Header -->
        <div class="dashboard-header">
            <div>
                <h1>Admin Dashboard</h1>
                <p>Welcome back, <span id="adminUsername">...</span></p>
            </div>
            <div>
                <button type="button" id="logoutBtn" class="btn-primary">
                    <span class="material-icons">logout</span>
                    Logout
                </button>
            </div>
        </div>

        <!-- Courses Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>Courses</h2>
                <a href="/course-management" class="btn-primary">
                    <span class="material-icons">add</span>
                    Add Course
                </a>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Title</th>
                        <th>Credits</th>
                        <th>Max Students</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="coursesTableBody">
                    <tr>
                        <td colspan="8" class="table-loading">Loading courses...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Students Section -->
        <div class="dashboard-section">
            <div class="section-header">
                <h2>Students</h2>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Registered</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentsTableBody">
                    <tr>
                        <td colspan="3" class="table-loading">Loading students...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="admin.js"></script>
</body>
</html>
